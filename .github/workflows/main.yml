name: Build-Marble
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt install -y build-essential gcc-aarch64-linux-gnu

      - name: Clone
        run: |
          git clone --depth=1 https://github.com/LowTension/android_kernel_xiaomi_sm8475 kernel
          git clone --depth=1 https://github.com/morrownr/8812au-20210820 driver

      - name: Build
        run: |
          cd kernel
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- vendor/marble_defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare
          cd ../driver
          # Указываем KSRC явно и добавляем переменную для сборки модуля
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KSRC=$(pwd)/../kernel

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: 8812au-ko
          path: driver/8812au.ko
